name: Claude Auto Review

# Automatic Claude code review on every pull request. Review-only:
# `contents: read` + a comment-only tool allow-list, so it CANNOT merge, push,
# or modify code. Requires repo secret CLAUDE_CODE_OAUTH_TOKEN (`claude
# setup-token`) and the Claude GitHub App (https://github.com/apps/claude)
# with access to this repo. Runs on GitHub-hosted runners.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This is `security-skills`: a Hermes Agent skill pack for DEFENSIVE
            vulnerability research, CVE triage, exploit-intelligence workflows,
            code review, and security-tool-assisted analysis. Content is mostly
            `SKILL.md` workflow definitions (when to load, evidence needed, tools
            expected, hand-offs, expected output), possibly with helper scripts
            and tool configs (e.g. Semgrep/CodeQL). Adapt your review to the diff.

            Review this pull request, focusing on:
            - Skill safety & prompt-injection resistance: because these
              instructions DRIVE an autonomous agent, flag any wording that could
              push the agent toward destructive, offensive, or out-of-scope
              actions (running untrusted code, exfiltrating data, weakening the
              defensive framing), or that is vulnerable to injection from the
              untrusted CVE/advisory content being analyzed. Tool expectations
              should stay least-privilege.
            - Correctness & clarity of the skill contract: accurate trigger/
              load conditions, required evidence, tool names, hand-off targets,
              and output expectations; no broken or contradictory steps.
            - Any included scripts/configs: shell/Python safety (injection,
              unsafe subprocess, path handling), and committed secrets.
            - Maintainability and consistency with the other SKILL.md files.

            Note: The PR branch is already checked out in the current working directory.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
